name: Update git dependencies

on:
  schedule:
    - cron: "0 5 * * *"  # daily at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Upgrade git-tracked deps
        run: |
          uv lock --upgrade-package host-tools \
                  --upgrade-package telegram \
                  --upgrade-package s3wrapper
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Bump: chore: bump git dependencies"
          title: "Bump: chore: update git-tracked dependencies"
          branch: deps/git-update
          delete-branch: true
